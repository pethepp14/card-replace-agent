<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Replace Agent</title>
    <style>
      :root { color-scheme: dark; font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f172a, #111827); color: #eff6ff; }
      body { margin: 0; min-height: 100vh; }
      .page { width: min(1080px, calc(100vw - 24px)); margin: 0 auto; padding: 30px 0 60px; }
      .card { background: rgba(15, 23, 42, 0.92); border: 1px solid rgba(148, 163, 184, 0.22); border-radius: 24px; padding: 20px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.45); }
      h1 { font-size: 2rem; margin-bottom: 8px; }
      p { color: #dbeafe; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      .reason-list { display: grid; gap: 10px; }
      .reason { border: 1px solid rgba(148, 163, 184, 0.24); border-radius: 16px; background: linear-gradient(145deg, #1e293b, #111827); padding: 12px; }
      .reason strong { display: block; margin-bottom: 4px; }
      form { display: grid; gap: 10px; }
      label { display: grid; gap: 6px; font-size: 0.95rem; }
      input, textarea, select { border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.25); background: #111827; color: #eff6ff; padding: 10px 12px; }
      button { border: none; border-radius: 999px; padding: 10px 14px; background: linear-gradient(135deg, #38bdf8, #818cf8); color: #082f49; font-weight: 700; cursor: pointer; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p style="text-transform: uppercase; letter-spacing: 0.35em; font-size: 0.78rem; color: #93c5fd;">Card Replace Agent</p>
        <h1>Submit a replacement request for your card.</h1>
        <p>Choose why the card needs replacing and submit the details to start the request.</p>
      </section>

      <div class="grid" style="margin-top: 18px;">
        <section class="card">
          <h2>Choose the issue</h2>
          <div class="reason-list">
            {% for value, label, text in reasons %}
            <article class="reason">
              <strong>{{ label }}</strong>
              <span>{{ text }}</span>
            </article>
            {% endfor %}
          </div>
        </section>

        <section class="card">
          <h2>Replacement request form</h2>
          <form action="/request" method="post">
            <label>Full name
              <input type="text" name="full_name" placeholder="Alex Morgan" required>
            </label>
            <label>Card number (last 4 digits)
              <input type="text" name="last4" maxlength="4" placeholder="4821" required>
            </label>
            <label>Email
              <input type="email" name="email" placeholder="alex@example.com" required>
            </label>
            <label>Issue type
              <select name="issue_type">
                {% for value, label, _ in reasons %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
              </select>
            </label>
            <label>Notes
              <textarea name="notes" rows="4" placeholder="Describe what happened to the card."></textarea>
            </label>
            <button type="submit">Submit request</button>
          </form>
        </section>
      </div>
    </main>
  </body>
</html>
